version: "3"

services:

  backend:
    build: ./VENDOR_BACKEND
    ports:
      - "6061:6060"
    env_file:
      - ./VENDOR_BACKEND/.env
    depends_on:
      - redis

  frontend:
    build: ./VENDOR_DASHBOARD
    ports:
      - "8081:80"

  redis:
    image: redis

  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "3000:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_data: